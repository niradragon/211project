<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>audio</title>

  <style>
    body {
      font-family: "Hiragino Maru Gothic ProN", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fff9c4, #e1bee7);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #8e24aa;
      margin-bottom: 20px;
    }

    .audio-box {
      background: #fffde7;
      border-left: 6px solid #ce93d8;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    p {
      margin: 0 0 10px;
      color: #6a1b9a;
      font-weight: bold;
    }

    audio {
      width: 100%;
    }
  </style>

</head>

<body>
  <div class="container">
    <h2>一覧</h2>

    <div class="audio-box">
    <p>① 「え？あぁ、そう。」-非日常談話・怪奇七篇</p>
  <audio controls>
    <source src="eaasou.mp3" type="audio/mpeg">
  </audio>

  <p>② 「プリンセスに口づけを」Toni9ht購入特典</p>
  <audio controls>
    <source src="princess.m4a" type="audio/mp4">
  </audio>

  <audio controls>
    <source src="TripTrapLoveTrap.m4a" type="audio/mpeg">
  </audio>
  
  
    </div>

  </div>
</body>
</html>
